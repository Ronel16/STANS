name: Secrets Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 7 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks:
    name: Detect secrets - full history scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        id: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Upload Gitleaks SARIF to Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results.sarif
          category: gitleaks-secrets
        continue-on-error: true

      - name: Fail if secrets detected
        if: steps.gitleaks.outcome == 'failure'
        run: |
          echo "Secrets detected in repository history. Review Security tab."
          exit 1
