name: STANS DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --frozen-lockfile
      - run: npm run build
        env:
          NODE_OPTIONS: "--max-old-space-size=2048"

  build-scan-push:
    name: Build, Scan & Push
    runs-on: [self-hosted, homelab]
    needs: [validate]
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build \
            -t localhost:5000/stans-app:latest \
            -t localhost:5000/stans-app:${{ github.sha }} \
            .

      - name: Trivy scan
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --exit-code 0 \
            localhost:5000/stans-app:latest

      - name: Login et push registry
        run: |
          echo "${{ secrets.HOMELAB_REGISTRY_PASSWORD }}" | \
            docker login localhost:5000 \
            -u ${{ secrets.HOMELAB_REGISTRY_USER }} \
            --password-stdin
          docker push localhost:5000/stans-app:latest
          docker push localhost:5000/stans-app:${{ github.sha }}

  deploy:
    name: Deploy
    runs-on: [self-hosted, homelab]
    needs: [build-scan-push]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Deploy container
        run: |
          docker stop stans-app 2>/dev/null || true
          docker rm   stans-app 2>/dev/null || true
          docker run -d \
            --name stans-app \
            --restart=always \
            -p 80:80 \
            -p 443:443 \
            -v /opt/stans/certs:/etc/nginx/certs:ro \
            localhost:5000/stans-app:latest
          sleep 8
          curl -sk https://localhost/health && echo "Deploy OK"
