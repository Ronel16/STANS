name: STANS DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ${{ secrets.HOMELAB_REGISTRY_URL }}
  IMAGE_NAME: stans-app

jobs:
  validate:
    name: Validate Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --frozen-lockfile
      - run: npm run build
        env:
          NODE_OPTIONS: "--max-old-space-size=2048"

  build-and-scan:
    name: Build & Trivy Scan
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: stans-app:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: stans-app:ci
          format: table
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: '0'

  push-registry:
    name: Push to Homelab Registry
    runs-on: ubuntu-latest
    needs: [build-and-scan]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Login to homelab registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.HOMELAB_REGISTRY_URL }}
          username: ${{ secrets.HOMELAB_REGISTRY_USER }}
          password: ${{ secrets.HOMELAB_REGISTRY_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.HOMELAB_REGISTRY_URL }}/stans-app:latest
            ${{ secrets.HOMELAB_REGISTRY_URL }}/stans-app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Homelab VM
    runs-on: ubuntu-latest
    needs: [push-registry]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STANS_VM_IP }}
          username: ${{ secrets.STANS_VM_USER }}
          key: ${{ secrets.STANS_SSH_PRIVATE_KEY }}
          script: |
            echo "${{ secrets.HOMELAB_REGISTRY_PASSWORD }}" | \
              docker login ${{ secrets.HOMELAB_REGISTRY_URL }} \
              -u ${{ secrets.HOMELAB_REGISTRY_USER }} --password-stdin

            docker pull ${{ secrets.HOMELAB_REGISTRY_URL }}/stans-app:latest

            docker stop stans-app 2>/dev/null || true
            docker rm   stans-app 2>/dev/null || true

            docker run -d \
              --name stans-app \
              --restart=always \
              -p 80:80 \
              -p 443:443 \
              -v /opt/stans/certs:/etc/nginx/certs:ro \
              ${{ secrets.HOMELAB_REGISTRY_URL }}/stans-app:latest

            sleep 8
            curl -sk https://localhost/health && echo "Deploy OK"
