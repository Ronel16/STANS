# ============================================================
# deploy.yml -- STANS DevSecOps Pipeline
#
# Corrections :
#   [FIX-1] Indentation YAML cassee sur les steps Trivy
#   [FIX-2] fi orphelin sans if correspondant
#   [FIX-3] exit 1 redondant avec --exit-code 1
#   [FIX-4] Double scan unifie : CRITICAL+HIGH + exit-code 1
#   [FIX-5] Deploy utilise le tag SHA, pas :latest
# ============================================================

name: STANS DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:

  validate:
    name: Validate Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci --frozen-lockfile
      - run: npm audit --audit-level=high
      - run: npm run build
        env:
          NODE_OPTIONS: "--max-old-space-size=2048"

  build-scan-push:
    name: Build, Scan and Push
    runs-on: [self-hosted, homelab]
    needs: [validate]
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Build image
        run: |
          docker build \
            -t localhost:5000/stans-app:latest \
            -t localhost:5000/stans-app:${{ github.sha }} \
            .

      # [FIX-1][FIX-2][FIX-3][FIX-4]
      # Scan unifie -- CRITICAL+HIGH bloquants, SARIF et gate dans la meme commande
      - name: Trivy - container scan
        run: |
          trivy image \
            --severity CRITICAL,HIGH \
            --exit-code 1 \
            --ignore-unfixed \
            --format sarif \
            --output trivy-results.sarif \
            localhost:5000/stans-app:${{ github.sha }}

      - name: Upload Trivy results to Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-container

      - name: Login and push registry
        run: |
          echo "${{ secrets.HOMELAB_REGISTRY_PASSWORD }}" | \
            docker login localhost:5000 \
              -u ${{ secrets.HOMELAB_REGISTRY_USER }} \
              --password-stdin
          docker push localhost:5000/stans-app:latest
          docker push localhost:5000/stans-app:${{ github.sha }}

  deploy:
    name: Deploy
    runs-on: [self-hosted, homelab]
    needs: [build-scan-push]
    if: github.ref == 'refs/heads/main'
    environment: production
    permissions: {}

    steps:
      # [FIX-5] Tag SHA -- deploiement deterministe
      - name: Deploy container
        run: |
          docker stop stans-app 2>/dev/null || true
          docker rm   stans-app 2>/dev/null || true
          docker run -d \
            --name stans-app \
            --restart=always \
            -p 80:80 \
            -p 443:443 \
            -v /opt/stans/certs:/etc/nginx/certs:ro \
            localhost:5000/stans-app:${{ github.sha }}
          sleep 8
          curl -sk https://localhost/health && echo "Deploy OK"
