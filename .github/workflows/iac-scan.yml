name: IaC Security Scan

on:
  push:
    branches: [ main ]
    paths:
      - 'Dockerfile'
      - 'nginx/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'Dockerfile'
      - 'nginx/**'
      - '.github/workflows/**'
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  checkov:
    name: Checkov - IaC misconfiguration scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Checkov scan - Dockerfile
        uses: bridgecrewio/checkov-action@a490b2b8f87f8e07dc25fa66b04e35d29d0af68d # v12
        with:
          directory: .
          framework: dockerfile
          output_format: sarif
          output_file_path: checkov-dockerfile.sarif
          soft_fail: true

      - name: Upload Dockerfile scan to Security tab
        uses: github/codeql-action/upload-sarif@45e2c9ad5c037c0b8b40f30b9d15f6f2bec1d1b3 # v3
        if: always()
        with:
          sarif_file: checkov-dockerfile.sarif
          category: checkov-dockerfile

      - name: Checkov scan - nginx config
        uses: bridgecrewio/checkov-action@a490b2b8f87f8e07dc25fa66b04e35d29d0af68d # v12
        with:
          directory: nginx
          framework: nginx
          output_format: sarif
          output_file_path: checkov-nginx.sarif
          soft_fail: true
        continue-on-error: true

      - name: Upload nginx scan to Security tab
        uses: github/codeql-action/upload-sarif@45e2c9ad5c037c0b8b40f30b9d15f6f2bec1d1b3 # v3
        if: always()
        with:
          sarif_file: checkov-nginx.sarif
          category: checkov-nginx
        continue-on-error: true

      - name: Checkov scan - GitHub Actions workflows
        uses: bridgecrewio/checkov-action@a490b2b8f87f8e07dc25fa66b04e35d29d0af68d # v12
        with:
          directory: .github/workflows
          framework: github_actions
          output_format: sarif
          output_file_path: checkov-actions.sarif
          soft_fail: true

      - name: Upload Actions scan to Security tab
        uses: github/codeql-action/upload-sarif@45e2c9ad5c037c0b8b40f30b9d15f6f2bec1d1b3 # v3
        if: always()
        with:
          sarif_file: checkov-actions.sarif
          category: checkov-github-actions

      - name: Checkov summary
        uses: bridgecrewio/checkov-action@a490b2b8f87f8e07dc25fa66b04e35d29d0af68d # v12
        with:
          directory: .
          framework: dockerfile,nginx,github_actions
          output_format: cli
          soft_fail: true
