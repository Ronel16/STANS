# ============================================================
# iac-scan.yml -- IaC Security Scan
#
# Corrections :
#   [FIX-1] soft_fail: true -> soft_fail: false sur Dockerfile
#           et GitHub Actions workflows
#           Avant : Checkov ne bloquait jamais, meme sur CRITICAL
#
#   [FIX-2] Scan summary final supprime
#           Etait une 4eme execution Checkov redondante
#
# Note : nginx conserve soft_fail: true -- support framework
#        Checkov nginx limite, faux positifs connus.
# ============================================================

name: IaC Security Scan

on:
  push:
    branches: [ main ]
    paths:
      - 'Dockerfile'
      - 'nginx/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'Dockerfile'
      - 'nginx/**'
      - '.github/workflows/**'
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  checkov:
    name: Checkov - IaC misconfiguration scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      # [FIX-1] soft_fail: false -- bloque sur misconfiguration CRITICAL/HIGH
      # CIS Controls v8 : Control 4.1 -- Secure Configuration Process
      - name: Checkov scan - Dockerfile
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: dockerfile
          output_format: sarif
          output_file_path: checkov-dockerfile.sarif
          soft_fail: false

      - name: Upload Dockerfile scan to Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov-dockerfile.sarif
          category: checkov-dockerfile

      # soft_fail: true maintenu -- framework nginx Checkov produit des faux positifs
      - name: Checkov scan - nginx config
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: nginx
          framework: nginx
          output_format: sarif
          output_file_path: checkov-nginx.sarif
          soft_fail: true
        continue-on-error: true

      - name: Upload nginx scan to Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('checkov-nginx.sarif') != ''
        with:
          sarif_file: checkov-nginx.sarif
          category: checkov-nginx
        continue-on-error: true

      # [FIX-1] soft_fail: false -- bloque sur misconfiguration workflows
      # Detecte : permissions trop larges, actions non epinglees, secrets exposes
      - name: Checkov scan - GitHub Actions workflows
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .github/workflows
          framework: github_actions
          output_format: sarif
          output_file_path: checkov-actions.sarif
          soft_fail: false

      - name: Upload Actions scan to Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov-actions.sarif
          category: checkov-github-actions

      # [FIX-2] Step summary supprime -- etait une 4eme execution redondante
